global:
  scrape_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  - job_name: consul-services
    consul_sd_configs:
      - server: host.docker.internal:8500
    relabel_configs:
      - source_labels: [__meta_consul_service]
        regex: (conductor-api|func1-python|func2-ts|review-service|otel-collector-metrics)
        action: keep

      - source_labels: [__meta_consul_service]
        regex: conductor-api
        target_label: __metrics_path__
        replacement: /actuator/prometheus

      - source_labels: [__meta_consul_service]
        regex: (func1-python|func2-ts|review-service|otel-collector-metrics)
        target_label: __metrics_path__
        replacement: /metrics

      - source_labels: [__meta_consul_service]
        target_label: service
        replacement: $1
