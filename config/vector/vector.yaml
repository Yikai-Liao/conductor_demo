data_dir: /var/lib/vector

api:
  enabled: true
  address: 0.0.0.0:8686

sources:
  docker_logs:
    type: docker_logs
    docker_host: unix:///var/run/docker.sock

transforms:
  parse_demo_logs:
    type: remap
    inputs:
      - docker_logs
    source: |
      .container_name = replace(string!(.container_name), r'^/', "")
      .nomad_job = ""
      if exists(.label."com.hashicorp.nomad.job_name") {
        .nomad_job = string!(.label."com.hashicorp.nomad.job_name")
      }
      .source_type = "docker"
      parsed, err = parse_json(string!(.message))
      if err == null && is_object(parsed) {
        . = merge!(., parsed)
      }
      if !exists(.service) || is_null(.service) {
        if .nomad_job != "" {
          .service = .nomad_job
        } else {
          .service = .container_name
        }
      }
      .message = string!(.message)
      ._msg = .message
      if exists(.ts) && !is_null(.ts) && is_string(.ts) {
        ._time = string!(.ts)
      } else if exists(.timestamp) && !is_null(.timestamp) {
        if is_timestamp(.timestamp) {
          ._time = format_timestamp!(.timestamp, format: "%+")
        } else {
          ._time = string!(.timestamp)
        }
      }
      .stream = string!(.stream)

  select_demo_services:
    type: filter
    inputs:
      - parse_demo_logs
    condition: |
      .nomad_job == "conductor" ||
      .nomad_job == "func1-python" ||
      .nomad_job == "func2-ts" ||
      .nomad_job == "review-service" ||
      .service == "func1-python" ||
      .service == "func2-ts" ||
      .service == "review-service"

  normalize_demo_logs:
    type: remap
    inputs:
      - select_demo_services
    source: |
      del(.label)
      del(.container_created_at)
      del(.container_id)
      del(.image)

sinks:
  victoria_logs:
    type: elasticsearch
    inputs:
      - normalize_demo_logs
    endpoints:
      - http://victoria-logs:9428/insert/elasticsearch
    mode: bulk
    api_version: v8
    compression: gzip
    healthcheck: false
