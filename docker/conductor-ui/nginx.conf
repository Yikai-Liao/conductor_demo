server {
  listen 5000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header Referrer-Policy "strict-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;

  location / {
    try_files $uri /index.html;
  }
}
