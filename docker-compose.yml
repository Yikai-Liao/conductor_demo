x-build-args: &build_args
  DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-docker.randallanjie.com}

name: ${COMPOSE_PROJECT_NAME:-conductor-demo}

services:
  vault:
    image: ${DOCKER_IMAGE_PREFIX:-docker.randallanjie.com}/hashicorp/vault:${VAULT_VERSION:-1.21.4}
    entrypoint: ["vault"]
    command:
      - server
      - -config=/vault/config/server.hcl
    cap_add:
      - IPC_LOCK
    volumes:
      - ./config/vault:/vault/config:ro
      - vault_data:/vault/file
    ports:
      - "${LOCAL_BIND_ADDR:-127.0.0.1}:${VAULT_HTTP_PORT:-18200}:8200"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - demo
    restart: unless-stopped

  postgres:
    image: ${DOCKER_IMAGE_PREFIX:-docker.randallanjie.com}/library/postgres:${POSTGRES_VERSION:-18.3-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-conductor}
      POSTGRES_USER: ${POSTGRES_USER:-conductor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conductor}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conductor} -d ${POSTGRES_DB:-conductor}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - demo
    restart: unless-stopped

  otel-collector:
    image: ${DOCKER_IMAGE_PREFIX:-docker.randallanjie.com}/otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION:-0.149.0}
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./config/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${PUBLIC_BIND_ADDR:-0.0.0.0}:4317:4317"
      - "${PUBLIC_BIND_ADDR:-0.0.0.0}:4318:4318"
      - "${PUBLIC_BIND_ADDR:-0.0.0.0}:8889:8889"
    networks:
      - demo
    restart: unless-stopped

  vmagent:
    image: ${DOCKER_IMAGE_PREFIX:-docker.randallanjie.com}/victoriametrics/vmagent:${VICTORIA_METRICS_VERSION:-v1.139.0}
    command:
      - --promscrape.config=/etc/vmagent/prometheus.yml
      - --remoteWrite.url=http://victoria-metrics:8428/api/v1/write
      - --remoteWrite.forceVMProto=true
      - --remoteWrite.flushInterval=2s
      - --remoteWrite.tmpDataPath=/vmagent-remotewrite-data
    depends_on:
      - victoria-metrics
    volumes:
      - ./config/vmagent/prometheus.yml:/etc/vmagent/prometheus.yml:ro
      - vmagent_data:/vmagent-remotewrite-data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - demo
    restart: unless-stopped

  victoria-metrics:
    image: ${DOCKER_IMAGE_PREFIX:-docker.randallanjie.com}/victoriametrics/victoria-metrics:${VICTORIA_METRICS_VERSION:-v1.139.0}
    command:
      - --storageDataPath=/victoria-metrics-data
      - --httpListenAddr=:8428
    volumes:
      - victoria_metrics_data:/victoria-metrics-data
    ports:
      - "${PUBLIC_BIND_ADDR:-0.0.0.0}:8428:8428"
    networks:
      - demo
    restart: unless-stopped

  victoria-logs:
    image: ${DOCKER_IMAGE_PREFIX:-docker.randallanjie.com}/victoriametrics/victoria-logs:${VICTORIA_LOGS_VERSION:-v1.24.0-victorialogs}
    command:
      - --storageDataPath=/victoria-logs-data
      - --httpListenAddr=:9428
    volumes:
      - victoria_logs_data:/victoria-logs-data
    ports:
      - "${PUBLIC_BIND_ADDR:-0.0.0.0}:9428:9428"
    networks:
      - demo
    restart: unless-stopped

  vector:
    image: ${DOCKER_IMAGE_PREFIX:-docker.randallanjie.com}/timberio/vector:${VECTOR_VERSION:-0.54.0-debian}
    command: ["--config", "/etc/vector/vector.yaml"]
    depends_on:
      - victoria-logs
    volumes:
      - ./config/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - vector_data:/var/lib/vector
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${PUBLIC_BIND_ADDR:-0.0.0.0}:8686:8686"
    networks:
      - demo
    restart: unless-stopped

  grafana:
    build:
      context: .
      dockerfile: docker/grafana/Dockerfile
      args:
        <<: *build_args
        GRAFANA_VERSION: ${GRAFANA_VERSION:-12.4.2}
        VICTORIALOGS_PLUGIN_VERSION: 0.26.3
      network: host
    environment:
      GF_PATHS_PLUGINS: /opt/grafana-plugins
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - victoria-metrics
      - victoria-logs
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${PUBLIC_BIND_ADDR:-0.0.0.0}:${GRAFANA_PORT:-13000}:3000"
    networks:
      - demo
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
      args: *build_args
      network: host
    environment:
      CONSUL_HTTP_ADDR: http://host.docker.internal:8500
      GATEWAY_PORT: 8080
      GATEWAY_REFRESH_SECONDS: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PUBLIC_BIND_ADDR:-0.0.0.0}:${GATEWAY_PORT:-18080}:8080"
    networks:
      - demo
    restart: unless-stopped

  toolbox:
    build:
      context: .
      dockerfile: toolbox/Dockerfile
      args:
        <<: *build_args
        CONSUL_VERSION: ${CONSUL_VERSION:-1.22.6}
        NOMAD_VERSION: ${NOMAD_VERSION:-1.11.3}
        VAULT_VERSION: ${VAULT_VERSION:-1.21.4}
      network: host
    command: ["sleep", "infinity"]
    environment:
      CONSUL_HTTP_ADDR: http://host.docker.internal:8500
      CONDUCTOR_SERVER_URL: http://gateway:8080/api
      CONDUCTOR_UI_URL: http://gateway:8080
      DOCKER_NETWORK: ${DOCKER_NETWORK:-conductor-demo}
      FUNC1_IMAGE: ${FUNC1_IMAGE:-docker.randallanjie.com/conductor-demo/func1-python:dev}
      FUNC2_IMAGE: ${FUNC2_IMAGE:-docker.randallanjie.com/conductor-demo/func2-ts:dev}
      GATEWAY_URL: http://gateway:8080
      GRAFANA_URL: http://grafana:3000
      NOMAD_ADDR: http://host.docker.internal:4646
      REVIEW_API_TOKEN: ${REVIEW_API_TOKEN:-review-demo-token}
      REVIEW_SERVICE_URL: http://gateway:8080/review
      REVIEW_SERVICE_IMAGE: ${REVIEW_SERVICE_IMAGE:-docker.randallanjie.com/conductor-demo/review-service:dev}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VM_INTERNAL_URL: http://victoria-metrics:8428
      VL_INTERNAL_URL: http://victoria-logs:9428
    depends_on:
      - gateway
      - vault
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/workspace
    working_dir: /workspace
    networks:
      - demo
    restart: unless-stopped

networks:
  demo:
    name: ${DOCKER_NETWORK:-conductor-demo}

volumes:
  grafana_data:
  postgres_data:
  vault_data:
  vector_data:
  victoria_logs_data:
  victoria_metrics_data:
  vmagent_data:
