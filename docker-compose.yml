x-proxy-build-args: &proxy_build_args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  ALL_PROXY: ${ALL_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,.local},host.docker.internal,gateway,toolbox,postgres,otel-collector,grafana,vault,vector,vmagent,victoria-metrics,victoria-logs,.service.consul

x-proxy-env: &proxy_env
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  ALL_PROXY: ${ALL_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,.local},host.docker.internal,gateway,toolbox,postgres,otel-collector,grafana,vault,vector,vmagent,victoria-metrics,victoria-logs,.service.consul
  http_proxy: ${HTTP_PROXY:-}
  https_proxy: ${HTTPS_PROXY:-}
  all_proxy: ${ALL_PROXY:-}
  no_proxy: ${NO_PROXY:-localhost,127.0.0.1,.local},host.docker.internal,gateway,toolbox,postgres,otel-collector,grafana,vault,vector,vmagent,victoria-metrics,victoria-logs,.service.consul

name: ${COMPOSE_PROJECT_NAME:-conductor-demo}

services:
  vault:
    image: hashicorp/vault:${VAULT_VERSION:-1.17.6}
    command:
      - server
      - -dev
      - -dev-root-token-id=${VAULT_DEV_ROOT_TOKEN:-root}
      - -dev-listen-address=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    environment:
      <<: *proxy_env
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-root}
    volumes:
      - ./config/vault:/vault/config:ro
      - ./runtime/vault:/vault/file
    ports:
      - "${VAULT_HTTP_PORT:-18200}:8200"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - demo
    restart: unless-stopped

  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    environment:
      <<: *proxy_env
      POSTGRES_DB: ${POSTGRES_DB:-conductor}
      POSTGRES_USER: ${POSTGRES_USER:-conductor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conductor}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conductor} -d ${POSTGRES_DB:-conductor}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./runtime/postgres:/var/lib/postgresql/data
    networks:
      - demo
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION:-0.122.1}
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./config/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - demo
    restart: unless-stopped

  vmagent:
    image: victoriametrics/vmagent:${VICTORIA_METRICS_VERSION:-v1.112.0}
    command:
      - --promscrape.config=/etc/vmagent/prometheus.yml
      - --remoteWrite.url=http://victoria-metrics:8428/api/v1/write
      - --remoteWrite.forceVMProto=true
      - --remoteWrite.flushInterval=2s
      - --remoteWrite.tmpDataPath=/vmagent-remotewrite-data
    depends_on:
      - victoria-metrics
    volumes:
      - ./config/vmagent/prometheus.yml:/etc/vmagent/prometheus.yml:ro
      - ./runtime/vmagent:/vmagent-remotewrite-data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - demo
    restart: unless-stopped

  victoria-metrics:
    image: victoriametrics/victoria-metrics:${VICTORIA_METRICS_VERSION:-v1.112.0}
    command:
      - --storageDataPath=/victoria-metrics-data
      - --httpListenAddr=:8428
    volumes:
      - ./runtime/victoria-metrics:/victoria-metrics-data
    networks:
      - demo
    restart: unless-stopped

  victoria-logs:
    image: victoriametrics/victoria-logs:${VICTORIA_LOGS_VERSION:-v1.18.0-victorialogs}
    command:
      - --storageDataPath=/victoria-logs-data
      - --httpListenAddr=:9428
    volumes:
      - ./runtime/victoria-logs:/victoria-logs-data
    networks:
      - demo
    restart: unless-stopped

  vector:
    image: timberio/vector:${VECTOR_VERSION:-0.41.1-debian}
    command: ["--config", "/etc/vector/vector.yaml"]
    depends_on:
      - victoria-logs
    volumes:
      - ./config/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ./runtime/vector:/var/lib/vector
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - demo
    restart: unless-stopped

  grafana:
    build:
      context: .
      dockerfile: docker/grafana/Dockerfile
      args:
        GRAFANA_VERSION: ${GRAFANA_VERSION:-11.5.2}
        VICTORIALOGS_PLUGIN_VERSION: 0.26.3
      network: host
    environment:
      <<: *proxy_env
      GF_PATHS_PLUGINS: /opt/grafana-plugins
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - victoria-metrics
      - victoria-logs
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-13000}:3000"
    networks:
      - demo
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
      args: *proxy_build_args
      network: host
    environment:
      <<: *proxy_env
      CONSUL_HTTP_ADDR: http://host.docker.internal:8500
      GATEWAY_PORT: 8080
      GATEWAY_REFRESH_SECONDS: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${GATEWAY_PORT:-18080}:8080"
    networks:
      - demo
    restart: unless-stopped

  toolbox:
    build:
      context: .
      dockerfile: toolbox/Dockerfile
      args:
        <<: *proxy_build_args
        CONSUL_VERSION: ${CONSUL_VERSION:-1.19.1}
        NOMAD_VERSION: ${NOMAD_VERSION:-1.8.4}
        VAULT_VERSION: ${VAULT_VERSION:-1.17.6}
      network: host
    command: ["sleep", "infinity"]
    environment:
      <<: *proxy_env
      CONSUL_HTTP_ADDR: http://host.docker.internal:8500
      CONDUCTOR_SERVER_URL: http://gateway:8080/api
      CONDUCTOR_UI_URL: http://gateway:8080
      DOCKER_NETWORK: ${DOCKER_NETWORK:-conductor-demo}
      FUNC1_IMAGE: ${FUNC1_IMAGE:-conductor-demo/func1-python:dev}
      FUNC2_IMAGE: ${FUNC2_IMAGE:-conductor-demo/func2-ts:dev}
      GATEWAY_URL: http://gateway:8080
      GRAFANA_URL: http://grafana:3000
      NOMAD_ADDR: http://host.docker.internal:4646
      REVIEW_API_TOKEN: ${REVIEW_API_TOKEN:-review-demo-token}
      REVIEW_SERVICE_URL: http://gateway:8080/review
      REVIEW_SERVICE_IMAGE: ${REVIEW_SERVICE_IMAGE:-conductor-demo/review-service:dev}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:-root}
      VM_INTERNAL_URL: http://victoria-metrics:8428
      VL_INTERNAL_URL: http://victoria-logs:9428
    depends_on:
      - gateway
      - vault
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/workspace
    working_dir: /workspace
    networks:
      - demo
    restart: unless-stopped

networks:
  demo:
    name: ${DOCKER_NETWORK:-conductor-demo}

volumes:
  grafana_data:
